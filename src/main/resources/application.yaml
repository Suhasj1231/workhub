spring:
  application:
    name: workhub

  datasource:
    url: jdbc:postgresql://localhost:5432/workhub
    username: workhub_user
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  redis:
    host: localhost
    port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: workhub7004@gmail.com
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
