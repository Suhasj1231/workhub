spring:
  application:
    name: workhub

  datasource:
    url: jdbc:postgresql://localhost:5432/workhub
    username: workhub_user
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
